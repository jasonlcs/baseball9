<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Baseball - HTML5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="scoreboard">
            <div class="score-box">
                <span class="label">AWAY</span>
                <span id="score-away" class="value">0</span>
            </div>
            <div class="score-box">
                <span class="label">INNING</span>
                <span id="inning" class="value">1 TOP</span>
            </div>
            <div class="score-box">
                <span class="label">HOME</span>
                <span id="score-home" class="value">0</span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="controls">
            <p><strong>桌機：</strong>上半局點擊投球、下半局按空白鍵/點擊揮棒</p>
            <p><strong>手機：</strong>上半局拖曳準星後放開投球、下半局點擊揮棒</p>
        </div>
        <div id="mobile-controls" aria-label="Mobile Pitch Controls">
            <div class="mobile-hint">手機投球：按住球場拖曳瞄準，放開出手</div>
            <div class="pitch-buttons">
                <button type="button" class="pitch-btn active" data-pitch="FAST">FAST</button>
                <button type="button" class="pitch-btn" data-pitch="CURVE">CURVE</button>
                <button type="button" class="pitch-btn" data-pitch="CHANGE">CHANGE</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
